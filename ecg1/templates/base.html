<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ECG Digitize{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.0.1/chartjs-plugin-zoom.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=2.1">
</head>

<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="/" class="brand">ECG <span class="accent">Digitize</span></a>
            <div class="nav-links" id="nav-links">
                <a href="/login" class="nav-link" id="nav-login">Login</a>
                <a href="/signup" class="nav-link nav-btn" id="nav-signup">Sign Up</a>
                <div class="user-menu hidden" id="user-menu">
                    <a href="/dashboard" class="nav-link">Dashboard</a>
                    <a href="/dataset" class="nav-link" style="color:#38bdf8;">🧠 Dataset</a>
                    <button class="nav-link logout-btn" id="btn-logout">Logout</button>
                </div>
            </div>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 ECG Digitize</p>
        </div>
    </footer>
    <script src="{{ url_for('static', filename='script.js') }}?v=2.1"></script>
</body>

</html>
