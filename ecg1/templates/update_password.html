{% extends "base.html" %}

{% block title %}Update Password - ECG Digitize{% endblock %}

{% block content %}
<div class="auth-container animated-fade-in">
    <div class="auth-card glassmorphism">
        <div class="auth-header">
            <h1>Reset Password</h1>
            <p>Enter your new secure password below</p>
        </div>

        <form id="update-password-form" class="auth-form">
            <div class="input-group">
                <label for="new-password">New Password</label>
                <input type="password" id="new-password" placeholder="••••••••" required>
            </div>

            <div id="update-msg" class="validation-msg hidden"></div>

            <button type="submit" class="btn-primary" id="btn-update">
                <span class="btn-text">Update Password</span>
                <div class="spinner-small hidden"></div>
            </button>
        </form>

        <div class="auth-footer" id="post-update-links" style="display: none;">
            <p><a href="/login" class="btn-secondary" style="display: inline-block; margin-top: 1rem;">Go to Login</a>
            </p>
        </div>
    </div>
</div>

<style>
    .auth-container {
        max-width: 450px;
        margin: 6rem auto;
    }

    .auth-card {
        padding: 3rem;
        background: var(--surface);
        border-radius: 1.5rem;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--border);
    }

    .glassmorphism {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-header h1 {
        font-size: 2rem;
        font-weight: 800;
        color: var(--text-main);
        letter-spacing: -0.025em;
        margin-bottom: 0.5rem;
    }

    .auth-header p {
        color: var(--text-muted);
        font-size: 0.95rem;
    }

    .auth-form {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }

    .auth-footer {
        margin-top: 2rem;
        text-align: center;
        font-size: 0.9rem;
    }
</style>
{% endblock %}
