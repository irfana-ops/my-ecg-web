{% extends "base.html" %}

{% block title %}Upload ECG - ECG Digitize{% endblock %}

{% block content %}
<div class="upload-container">
    <div class="upload-header">
        <h1>ECG Digitize</h1>
        <p>Upload Your ECG Report for Digitization</p>
    </div>

    <div class="upload-card">
        <div id="drop-zone" class="drop-zone">
            <div class="drop-zone-content">
                <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <div class="drop-zone-text">Drag & Drop your ECG image here</div>
                <div class="drop-zone-subtext">Supports JPG, PNG, JPEG</div>
                <button type="button" class="btn-browse" onclick="document.getElementById('file-input').click()">Browse
                    Files</button>
            </div>
            <input type="file" id="file-input" class="hidden" accept=".jpg,.jpeg,.png,image/jpeg,image/png">
        </div>

        <div class="location-selection"
            style="margin-top: 1.5rem; padding: 1rem; background: #f8fafc; border-radius: 0.75rem; border: 1px solid #e2e8f0;">
            <label style="display: block; font-weight: 600; color: #475569; margin-bottom: 0.5rem;">Select Location
                (Kerala Districts)</label>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <select id="district-select" class="form-select"
                    style="flex: 1; padding: 0.6rem; border-radius: 0.5rem; border: 1px solid #cbd5e1;">
                    <option value="">Select District</option>
                    <option value="Alappuzha">Alappuzha</option>
                    <option value="Ernakulam">Ernakulam</option>
                    <option value="Idukki">Idukki</option>
                    <option value="Kannur">Kannur</option>
                    <option value="Kasaragod">Kasaragod</option>
                    <option value="Kollam">Kollam</option>
                    <option value="Kottayam">Kottayam</option>
                    <option value="Kozhikode">Kozhikode</option>
                    <option value="Malappuram">Malappuram</option>
                    <option value="Palakkad">Palakkad</option>
                    <option value="Pathanamthitta">Pathanamthitta</option>
                    <option value="Thiruvananthapuram">Thiruvananthapuram</option>
                    <option value="Thrissur">Thrissur</option>
                    <option value="Wayanad">Wayanad</option>
                </select>
            </div>
            <div id="selected-coords-display" class="hidden"
                style="margin-top: 0.5rem; font-size: 0.8rem; color: #059669;">
                ✅ District selected successfully
            </div>
        </div>

        <div id="validation-msg" class="validation-msg hidden"></div>

        <div id="preview-section" class="preview-section hidden">
            <div class="preview-wrapper">
                <img id="image-preview" src="" alt="ECG Preview">
                <button type="button" class="btn-remove" id="btn-remove" title="Remove image">&times;</button>
            </div>

            <div class="progress-container hidden" id="progress-container">
                <div class="progress-bar-wrapper">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="progress-text" id="progress-text">0%</div>
            </div>

            <div class="loading-spinner hidden" id="loading-spinner">
                <div class="spinner"></div>
                <p>Uploading... Please wait</p>
            </div>

            <button type="button" id="btn-proceed" class="btn-primary" disabled>Proceed to Signal Processing</button>
        </div>
    </div>
</div>
{% endblock %}
